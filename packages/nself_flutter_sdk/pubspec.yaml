name: nself_flutter_sdk
description: "Flutter SDK for nSelf — wraps Hasura GraphQL, Auth, Storage, and Realtime into idiomatic Dart APIs."
version: 0.1.0
homepage: https://nself.org
repository: https://github.com/nself-org/nclaw

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ">=5.4.0 <6.0.0"

  # WebSocket
  web_socket_channel: ">=3.0.0 <4.0.0"

  # GraphQL
  gql: ">=1.0.0 <2.0.0"

  # JSON
  json_annotation: ">=4.9.0 <5.0.0"

  # State — integration helpers
  flutter_riverpod: ">=2.6.0 <3.0.0"
  provider: ">=6.1.0 <7.0.0"

  # Auth SDK (re-export)
  nself_auth_sdk:
    path: ../../../../plugins-pro/paid/auth/flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ">=1.25.0 <2.0.0"
  mockito: ">=5.4.0 <6.0.0"
  build_runner: ">=2.4.0 <3.0.0"
  json_serializable: ">=6.8.0 <7.0.0"
  flutter_lints: ">=4.0.0 <5.0.0"
