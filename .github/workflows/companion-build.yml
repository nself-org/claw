name: Companion Desktop Builds

on:
  push:
    tags: ['companion-v*']
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
      - name: Build Tauri
        working-directory: desktop/tauri
        run: cargo tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: companion-${{ matrix.target }}
          path: |
            desktop/tauri/target/release/bundle/**/*.AppImage
            desktop/tauri/target/release/bundle/**/*.deb
            desktop/tauri/target/release/bundle/**/*.msi
            desktop/tauri/target/release/bundle/**/*.exe
            desktop/tauri/target/release/bundle/**/*.dmg
